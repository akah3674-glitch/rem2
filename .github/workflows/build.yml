name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build release APK
        run: cd android && gradle assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx3072m -Dorg.gradle.daemon=false'
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk rem2-v3.0-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rem2-v3.0-release
          path: rem2-v3.0-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.0.${{ github.run_number }}
          name: "Rem2 v3.0.${{ github.run_number }}"
          body: |
            ## Rem2 v3.0.${{ github.run_number }}

            ⚠️ **Chữ ký số mới** — cần gỡ bản cũ trước khi cài (nếu đã có rem2 cũ)

            ### Tính năng v3.0
            - 🗂 **Multi-tab** — nhiều tab Replit độc lập, nút ✕ để đóng từng tab
            - 📋 **Smart paste** — ấn tài khoản trong panel → tự dán vào ô đang focus
            - 👤 **Panel Tài khoản** — lưu và quản lý danh sách email/pass
            - 📧 **Panel Xác thực** — inbox Mail.tm, tự mở khi có email mới
            - ↻ **Nút Reload** + **＋ Tab mới** cố định trên thanh tab
            - 🟰 **FAB hamburger ≡** kéo được, bật/tắt panel
            - 🔧 **Fix CAPTCHA** "captcha token is invalid (code:1)"
            - 🤖 **Auto-onboarding** — tự chọn câu hỏi và nhấn Next
            - 🕵️ **Anti-detect** — giả lập thiết bị thật (DeviceProfile)
            - 📱 **Vuốt trái/phải** — back/forward trong trình duyệt
            - 📎 **Upload file** + 🖥 Desktop mode
          files: rem2-v3.0-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
