name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build release APK (persistent signing key)
        run: cd android && gradle assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx3072m -Dorg.gradle.daemon=false'
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk rem2-v2.0-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rem2-v2.0-release
          path: rem2-v2.0-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.0.${{ github.run_number }}
          name: "rem2 v2.0.${{ github.run_number }}"
          body: |
            ## rem2 v2.0.${{ github.run_number }}

            **Cài đè không mất dữ liệu** (cùng chữ ký với mọi bản cũ từ v2.0.73+)

            ### Tính năng
            - WebView Replit.com giả lập Cốc Cốc
            - Mail.tm tự tạo + xác thực email tự động
            - Tìm kiếm / chế độ máy tính / tải file
            - Vuốt cạnh để quay lại, kéo sâu để tải lại trang
            - FAB kéo được, tự điền email + mật khẩu
          files: rem2-v2.0-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
