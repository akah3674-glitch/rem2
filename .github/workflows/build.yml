name: Build & Release APK

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: gradle/actions/setup-gradle@v3

      - name: Accept SDK licences & install build tools
        run: |
          mkdir -p $ANDROID_HOME/licenses
          echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" > $ANDROID_HOME/licenses/android-sdk-license
          echo "84831b9409646a918e30573bab4c9c91346d8abd" >> $ANDROID_HOME/licenses/android-sdk-license
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            "platform-tools" \
            --sdk_root=$ANDROID_HOME

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: rem2-v6.0-release
          path: android/app/build/outputs/apk/release/app-release.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v6.0.${{ github.run_number }}
          name: "Rem2 v6.0.${{ github.run_number }}"
          body: |
            ## Rem2 v5.1 — Cốc Cốc UA mặc định

            ### ✨ Tính năng mới
            - **🔐 CAPTCHA thủ công**: tự giải trên màn hình, token lưu tự động
            - **💾 Token lưu lại**: nếu code:1, inject lại token cũ không cần giải lại
            - **🌐 Cốc Cốc UA**: trình duyệt Cốc Cốc làm UA mặc định (thay random Chrome)
            - **📱 UI mới sáng + tương phản tốt**: panel bo tròn, card nổi, màu rõ ràng
            - **🗂 Panel 3 tab**: Tài khoản / Xác thực+CAPTCHA / Tab manager

            ### 📦 Cài đặt
            Tải `app-release.apk` bên dưới · Android 7.0+
          files: android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
