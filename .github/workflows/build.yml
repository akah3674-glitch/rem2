name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build release APK
        run: cd android && gradle assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx3072m -Dorg.gradle.daemon=false'
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk rem2-v4.0-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rem2-v4.0-release
          path: rem2-v4.0-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v4.0.${{ github.run_number }}
          name: "Rem2 v4.0.${{ github.run_number }}"
          body: |
            ## Rem2 v4.0.${{ github.run_number }}

            ⚠️ **Cùng chữ ký với v3.x** — cài đè trực tiếp, không cần gỡ bản cũ

            ### 🆕 Tính năng v4.0

            #### 🖥 Twin Browser
            - Màn hình chính là Replit đầy đủ, tương tác như web thật
            - FAB mail (📧) kéo được bất kỳ đâu trên màn hình

            #### 📋 Smart Paste nâng cấp
            - Nhận biết loại field đang focus (email/password/username)
            - Dán đúng thông tin vào đúng ô — không cần chỉ định thủ công
            - Nút ⚡ Tự điền tài khoản: điền cả form đăng nhập chỉ 1 chạm

            #### 🗂 Tab Manager tích hợp trong panel
            - Tab thứ 3 trong panel: danh sách tất cả tab đang mở
            - Ấn để chuyển tab, ✕ để đóng, ＋ để tạo tab mới
            - Mỗi tab độc lập, tạo nhiều Replit riêng không trùng

            #### 🔍 Panel header nâng cấp
            - 🔍 Thanh tìm kiếm + URL (tìm Google hoặc mở URL)
            - 🖥 Desktop mode toggle (giữ trạng thái qua các tab)
            - ✉+ Tạo mail mới (xoá mail cũ, tạo mail mới tự động)
            - ✕ Đóng panel

            #### 🛡 Fix CAPTCHA triệt để
            - Vá hCaptcha (Replit sử dụng) — reset token khi gặp lỗi code:1
            - Vá reCAPTCHA v2 timing trong WebView
            - Vá Cloudflare Turnstile
            - Intercept cả fetch và XMLHttpRequest để detect và retry

            #### 🤖 Auto-Onboarding hoàn thiện
            - Tự động chọn câu hỏi (radio/checkbox/card options)
            - Tự động nhấn Next/Continue đến khi hết wizard
            - Tự chọn gói miễn phí
            - Loop lại nếu vẫn còn trang onboarding

            #### 🍪 Cookie & Session đầy đủ
            - Bật third-party cookies (cần cho hCaptcha)
            - Cookie hoạt động đúng trên mọi WebView

          files: rem2-v4.0-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
