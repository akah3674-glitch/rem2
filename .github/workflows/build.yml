name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | sdkmanager --licenses || true

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.2'

      - name: Build release APK
        run: cd android && gradle assembleRelease --no-daemon
        env:
          GRADLE_OPTS: '-Xmx3072m -Dorg.gradle.daemon=false'
          ANDROID_SDK_ROOT: /usr/local/lib/android/sdk

      - name: Rename APK
        run: cp android/app/build/outputs/apk/release/app-release.apk rem2-v3.3-release.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: rem2-v3.3-release
          path: rem2-v3.3-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v3.3.${{ github.run_number }}
          name: "Rem2 v3.3.${{ github.run_number }}"
          body: |
            ## Rem2 v3.3.${{ github.run_number }}

            ⚠️ **Cùng chữ ký với v3.0** — cài đè trực tiếp, không cần gỡ bản cũ

            ### ✨ Tính năng mới v3.3
            - 👆 **Vuốt trái/phải nâng cấp** — ngưỡng thấp hơn (60dp, velocity 250), haptic + toast "◀ Quay lại / ▶ Tiến tới"
            - ↻ **Reload có animation** — nút tải lại xoay 360° khi nhấn
            - 📧 **FAB Mail riêng** — icon mail kéo độc lập, badge đếm email chưa đọc, nhấn mở thẳng tab Xác thực
            - 🔒 **Auto-fill chỉ trang đăng ký** — KHÔNG tự điền trên trang đăng nhập (/login)
            - 📎 **Fix đính kèm file** — dùng ACTION_OPEN_DOCUMENT + createChooser + URI permission flag, không mất chỗ đính kèm

            ### Tính năng v3.0 (giữ nguyên)
            - 🗂 Multi-tab, 📋 Smart paste, 👤 Panel Tài khoản
            - 📧 Panel Xác thực (Mail.tm), ↻ Reload + ＋ Tab mới
            - 🔧 Fix CAPTCHA, 🤖 Auto-onboarding, 🕵️ Anti-detect
            - 📎 Upload file + 🖥 Desktop mode
          files: rem2-v3.3-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
